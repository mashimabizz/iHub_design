<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iHub — C Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f3eef7; height: 100%; -webkit-font-smoothing: antialiased; }
  body { font-family: "Noto Sans JP", -apple-system, system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
  @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="home-variations.jsx"></script>
<script type="text/babel" src="c-flow.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "#a695d8",
  "secondary": "#ffd977",
  "accent": "#f3c5d4"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <>
      <DesignCanvas
        title="iHub · C フロー（打診 → チャット → 取引完了）"
        subtitle="ホーム『打診する』からの遷移 / 証跡撮影＋両者承認＋評価まで"
      >
        <DCSection id="c1" title="C-1. 打診フロー">
          <DCArtboard id="propose" label="打診を送る — 自動テンプレ＋編集" width={420} height={900}>
            <IOSDevice width={420} height={900}>
              <ProposeScreen tweaks={t} />
            </IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="c2" title="C-2. 取引チャット — 当日のライブ運用（場所・時間は合意前にfix済）">
          <DCArtboard id="chat" label="取引内容＋待ち合わせピン留め／服装写真CTA／現在地共有／到着ステータス／証跡撮影への入口" width={420} height={900}>
            <IOSDevice width={420} height={900}>
              <ChatScreen tweaks={t} />
            </IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="c3" title="C-3. 取引完了フロー">
          <DCArtboard id="capture" label="① 証跡撮影 — 両者の交換物を1枚に" width={420} height={900}>
            <IOSDevice width={420} height={900} dark>
              <CompleteScreen tweaks={t} step="capture" />
            </IOSDevice>
          </DCArtboard>
          <DCArtboard id="approve" label="② 両者承認 — 内容確認" width={420} height={900}>
            <IOSDevice width={420} height={900}>
              <CompleteScreen tweaks={t} step="approve" />
            </IOSDevice>
          </DCArtboard>
          <DCArtboard id="rate" label="③ 評価＋コレクション更新＋X連携" width={420} height={900}>
            <IOSDevice width={420} height={900}>
              <CompleteScreen tweaks={t} step="rate" />
            </IOSDevice>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="iHub Tweaks">
        <TweakSection label="ブランドカラー" />
        <TweakColor label="プライマリ" value={t.primary} onChange={(v) => setTweak('primary', v)} />
        <TweakColor label="セカンダリ" value={t.secondary} onChange={(v) => setTweak('secondary', v)} />
        <TweakColor label="アクセント" value={t.accent} onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
