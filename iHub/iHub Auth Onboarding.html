<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iHub Auth + Onboarding · 認証＋初回設定</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f3eef7; height: 100%; -webkit-font-smoothing: antialiased; }
  body { font-family: "Noto Sans JP", -apple-system, system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="auth-onboarding.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "#a695d8",
  "secondary": "#a8d4e6",
  "accent": "#f3c5d4"
}/*EDITMODE-END*/;

function AuthOnboardingApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const W = 420, H = 900;
  return (
    <>
      <DesignCanvas
        title="iHub Auth + Onboarding"
        subtitle="認証フロー（7画面）＋ オンボーディング（5画面）＋ Google経由同意（1画面）= 計13画面"
      >
        <DCSection id="entry" title="① エントリー — ウェルカム / 新規登録 / Google同意">
          <DCArtboard id="welcome" label="① ウェルカム — メアド・Google・ログインの3CTA" width={W} height={H}>
            <IOSDevice width={W} height={H}><AOWelcome tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="signup" label="② 新規登録（メアド）— ハンドル＋メアド＋パスワード＋同意一体型" width={W} height={H}>
            <IOSDevice width={W} height={H}><AOSignup tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="google-consent" label="②' Google経由同意 — メール認証スキップ・ハンドル＋規約のみ" width={W} height={H}>
            <IOSDevice width={W} height={H}><AOGoogleConsent tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="email-verify" title="② メール認証 — 送信完了 / 認証完了">
          <DCArtboard id="email-sent" label="③ メール認証送信 — 60秒再送ガード・迷惑メール案内" width={W} height={H}>
            <IOSDevice width={W} height={H}><AOEmailSent tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="email-confirmed" label="④ メール認証完了 — 大きな ✓ アイコン＋次へ誘導" width={W} height={H}>
            <IOSDevice width={W} height={H}><AOEmailConfirmed tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="login" title="③ ログイン — メアド/Google・パスワードリセット">
          <DCArtboard id="login" label="⑤ ログイン — メアド＋パス／Google並列・パスワード忘れリンク" width={W} height={H}>
            <IOSDevice width={W} height={H}><AOLogin tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="pwd-reset" label="⑥ パスワードリセット — メアド入力＋送信" width={W} height={H}>
            <IOSDevice width={W} height={H}><AOPasswordReset tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="account-delete" title="④ アカウント削除 — 2段階確認">
          <DCArtboard id="delete" label="⑦ アカウント削除 — 警告＋理由選択（任意・複数）" width={W} height={H}>
            <IOSDevice width={W} height={H}><AOAccountDelete tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="onboarding" title="⑤ オンボーディング — 性別 → 推し → メンバー → AW → 完了">
          <DCArtboard id="ob-gender" label="⑧ 性別選択（1/4）— マッチング安全性のため必須" width={W} height={H}>
            <IOSDevice width={W} height={H}><AOOnboardGender tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="ob-group" label="⑨ 推し選択（2/4）— ジャンル横断（K-POP / アニメ / 2.5次元 / VTuber等）＋人気バッジ＋検索" width={W} height={H}>
            <IOSDevice width={W} height={H}><AOOnboardGroup tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="ob-member" label="⑩ 推しキャラ・推しメン選択（3/4）— 複数推しごとにセクション分け＋箱推しショートカット" width={W} height={H}>
            <IOSDevice width={W} height={H}><AOOnboardMember tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="ob-aw" label="⑪ AW初期設定（4/4）— エリア選択（任意・スキップ可）" width={W} height={H}>
            <IOSDevice width={W} height={H}><AOOnboardAW tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="ob-done" label="⑫ 完了 — プロフサマリ＋次は何をする？3カード" width={W} height={H}>
            <IOSDevice width={W} height={H}><AOOnboardDone tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Auth + Onboarding Tweaks">
        <TweakSection label="ブランドカラー" />
        <TweakColor label="プライマリ" value={t.primary} onChange={(v) => setTweak('primary', v)} />
        <TweakColor label="セカンダリ" value={t.secondary} onChange={(v) => setTweak('secondary', v)} />
        <TweakColor label="アクセント" value={t.accent} onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AuthOnboardingApp />);
</script>
</body>
</html>
