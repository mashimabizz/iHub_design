<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iHub — B Inventory & Capture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f3eef7; height: 100%; -webkit-font-smoothing: antialiased; }
  body { font-family: "Noto Sans JP", -apple-system, system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
  @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="home-variations.jsx"></script>
<script type="text/babel" src="b-inventory.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "#a695d8",
  "secondary": "#a8d4e6",
  "accent": "#f3c5d4"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <>
      <DesignCanvas
        title="iHub · B フロー（在庫管理 + 撮影フロー）"
        subtitle="グリッド在庫 / 携帯モード切替 / 撮影 → 切り抜き → メタ入力 → X投稿"
      >
        <DCSection id="b1" title="B-1. 在庫管理">
          <DCArtboard id="inv" label="グリッド一覧 + 携帯トグル + 譲/求タブ" width={420} height={900}>
            <IOSDevice width={420} height={900}>
              <InventoryScreen tweaks={t} />
            </IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="b2" title="B-2. 撮影フロー（3ステップ）">
          <DCArtboard id="shoot" label="① 撮影 — 通常/クイック/連続" width={420} height={900}>
            <IOSDevice width={420} height={900} dark>
              <CaptureFlowScreen tweaks={t} step="shoot" />
            </IOSDevice>
          </DCArtboard>
          <DCArtboard id="crop" label="② 切り抜き — 手動矩形ドラッグ" width={420} height={900}>
            <IOSDevice width={420} height={900}>
              <CaptureFlowScreen tweaks={t} step="crop" />
            </IOSDevice>
          </DCArtboard>
          <DCArtboard id="meta" label="③ メタ入力 — キャラ/種別/シリーズ/数量/状態/メモ + 掲載/トーン" width={420} height={900}>
            <IOSDevice width={420} height={900}>
              <CaptureFlowScreen tweaks={t} step="meta" />
            </IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="b3" title="B-3. X投稿テキスト自動生成">
          <DCArtboard id="xpost" label="登録後 / 在庫から複数選択どちらでも到達" width={420} height={900}>
            <IOSDevice width={420} height={900}>
              <CaptureFlowScreen tweaks={t} step="xpost" />
            </IOSDevice>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="iHub Tweaks">
        <TweakSection label="ブランドカラー" />
        <TweakColor label="プライマリ（譲）" value={t.primary} onChange={(v) => setTweak('primary', v)} />
        <TweakColor label="セカンダリ（求）" value={t.secondary} onChange={(v) => setTweak('secondary', v)} />
        <TweakColor label="アクセント" value={t.accent} onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
