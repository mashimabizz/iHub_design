<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iHub MVP · 全画面統合版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f3eef7; height: 100%; -webkit-font-smoothing: antialiased; }
  body { font-family: "Noto Sans JP", -apple-system, system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#a695d8"/>
    <rect x="22" y="18" width="22" height="40" rx="4" fill="#fff" opacity="0.92"/>
    <rect x="48" y="18" width="22" height="64" rx="4" fill="#fff" opacity="0.92"/>
    <rect x="22" y="62" width="22" height="20" rx="4" fill="#fff" opacity="0.92"/>
    <text x="50" y="93" font-family="sans-serif" font-size="9" font-weight="800" text-anchor="middle" fill="#fff">iHub</text>
  </svg>
</template>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="home-variations.jsx"></script>
<script type="text/babel" src="home-v2.jsx"></script>
<script type="text/babel" src="hub-screens.jsx"></script>
<script type="text/babel" src="b-inventory.jsx"></script>
<script type="text/babel" src="c-flow.jsx"></script>
<script type="text/babel" src="c-dispute.jsx"></script>
<script type="text/babel" src="aw-edit.jsx"></script>
<script type="text/babel" src="account-support.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "#a695d8",
  "secondary": "#a8d4e6",
  "accent": "#f3c5d4"
}/*EDITMODE-END*/;

function AllScreensApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const W = 420, H = 900;
  const Frame = ({ children }) => (
    <IOSDevice width={W} height={H}>{children}</IOSDevice>
  );

  return (
    <>
      <DesignCanvas
        title="iHub MVP — 全画面統合版"
        subtitle="ナビ統一（ホーム／在庫／取引／ウィッシュ／プロフ）· ハブ画面 · 在庫（list/collection）· 取引 · 申告 · AW · 設定"
      >
        {/* 1. ハブ画面（ホーム / プロフ / ウィッシュ） */}
        <DCSection id="hub" title="① ハブ画面 — ホーム ＋ プロフ ＋ ウィッシュ">
          <DCArtboard id="all-home" label="ホーム — マッチ提案 4タブ" width={W} height={H}>
            <Frame><HomeV2 tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-profile" label="プロフハブ — 図鑑・AW・設定の入口" width={W} height={H}>
            <Frame><ProfileHub tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-wish-list" label="ウィッシュ一覧 — 優先度＋flexibility＋探し中" width={W} height={H}>
            <Frame><WishlistList tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-wish-empty" label="ウィッシュ空状態" width={W} height={H}>
            <Frame><WishlistEmpty tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-wish-edit" label="ウィッシュ編集 — flexibility 3択" width={W} height={H}>
            <Frame><WishlistEdit tweaks={t} /></Frame>
          </DCArtboard>
        </DCSection>

        {/* 2. 在庫管理 — リスト/コレクション統合 */}
        <DCSection id="inventory" title="② 在庫 — リスト/コレクション切替・wish基準の図鑑統合">
          <DCArtboard id="all-inv-list-active" label="B-1 譲るもの · リスト · 譲る候補" width={W} height={H}>
            <Frame><InventoryScreen tweaks={t} initialTab="yuzuri" initialView="list" initialSub="active" /></Frame>
          </DCArtboard>
          <DCArtboard id="all-inv-list-keep" label="B-1 譲るもの · リスト · 自分用キープ" width={W} height={H}>
            <Frame><InventoryScreen tweaks={t} initialTab="yuzuri" initialView="list" initialSub="keep" /></Frame>
          </DCArtboard>
          <DCArtboard id="all-inv-list-traded" label="B-1 譲るもの · リスト · 過去に譲った" width={W} height={H}>
            <Frame><InventoryScreen tweaks={t} initialTab="yuzuri" initialView="list" initialSub="traded" /></Frame>
          </DCArtboard>
          <DCArtboard id="all-inv-collection" label="B-1 譲るもの · コレクション（wish基準・コンプ演出）" width={W} height={H}>
            <Frame><InventoryScreen tweaks={t} initialTab="yuzuri" initialView="collection" /></Frame>
          </DCArtboard>
          <DCArtboard id="all-inv-capture" label="B-2 撮影フロー — 譲る/キープ選択追加" width={W} height={H}>
            <Frame><CaptureFlowScreen tweaks={t} /></Frame>
          </DCArtboard>
        </DCSection>

        {/* 3. 取引フロー */}
        <DCSection id="trade" title="③ 取引フロー — 打診 → チャット → 完了">
          <DCArtboard id="all-trade-list" label="取引タブ — 打診中／進行中／過去" width={W} height={H}>
            <Frame><TradeTab tweaks={t} sub="active" /></Frame>
          </DCArtboard>
          <DCArtboard id="all-c1-propose" label="C-1 打診 — テンプレ＋送信前確認" width={W} height={H}>
            <Frame><ProposeScreen tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-c2-chat" label="C-2 チャット — QR本人確認・合流" width={W} height={H}>
            <Frame><ChatScreen tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-c3-capture" label="C-3 取引完了 撮影" width={W} height={H}>
            <Frame><CompleteScreen tweaks={t} step="capture" /></Frame>
          </DCArtboard>
          <DCArtboard id="all-c3-approve" label="C-3 取引完了 双方承認" width={W} height={H}>
            <Frame><CompleteScreen tweaks={t} step="approve" /></Frame>
          </DCArtboard>
          <DCArtboard id="all-c3-done" label="C-3 完了 — 評価＋コレクション連携" width={W} height={H}>
            <Frame><CompleteScreen tweaks={t} step="done" /></Frame>
          </DCArtboard>
        </DCSection>

        {/* 4. 相違あり申告 */}
        <DCSection id="dispute" title="④ 相違あり申告 — D-1〜D-6＋再審査">
          <DCArtboard id="all-d1" label="D-1 カテゴリ選択" width={W} height={H}>
            <Frame><D1Category tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-d2" label="D-2 証跡追加（必須）" width={W} height={H}>
            <Frame><D2Evidence tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-d3" label="D-3 送信完了" width={W} height={H}>
            <Frame><D3Submitted tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-d4" label="D-4 反論要請" width={W} height={H}>
            <Frame><D4Respondent tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-d5" label="D-5 仲裁中ステータス" width={W} height={H}>
            <Frame><D5Arbitration tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-d6" label="D-6 結果通知" width={W} height={H}>
            <Frame><D6Result tweaks={t} /></Frame>
          </DCArtboard>
        </DCSection>

        {/* 5. 参戦予定 AW */}
        <DCSection id="aw" title="⑤ 参戦予定 AW — 一覧＋詳細編集">
          <DCArtboard id="all-aw-list" label="AW 一覧 — ACTIVE NOW / SCHEDULED" width={W} height={H}>
            <Frame><AWListScreen tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-aw-add" label="AW 追加 — 2選択（位置主導 / イベント主導）" width={W} height={H}>
            <Frame><AWAddEntry tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-aw-edit-loc" label="AW 編集 — 位置主導（デフォルト）" width={W} height={H}>
            <Frame><AWEditLocationLed tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-aw-edit-event" label="AW 編集 — イベント主導（ショートカット）" width={W} height={H}>
            <Frame><AWEditEventLed tweaks={t} /></Frame>
          </DCArtboard>
        </DCSection>

        {/* 7. サポート・設定 */}
        <DCSection id="support" title="⑦ サポート・設定 — 通報 ／ ヘルプ ／ 設定">
          <DCArtboard id="all-report" label="規約違反通報 フォーム" width={W} height={H}>
            <Frame><ReportForm tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-report-done" label="通報受付 — #REP" width={W} height={H}>
            <Frame><ReportComplete tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-help" label="ヘルプ — FAQ" width={W} height={H}>
            <Frame><HelpFAQ tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-contact" label="運営問い合わせ" width={W} height={H}>
            <Frame><ContactForm tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-settings" label="設定トップ" width={W} height={H}>
            <Frame><SettingsTop tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-my-aw" label="自分の AW 一覧" width={W} height={H}>
            <Frame><MyAWList tweaks={t} /></Frame>
          </DCArtboard>
          <DCArtboard id="all-notif" label="通知設定" width={W} height={H}>
            <Frame><NotificationSettings tweaks={t} /></Frame>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="iHub MVP Tweaks">
        <TweakSection label="ブランドカラー" />
        <TweakColor label="プライマリ（ラベンダー）" value={t.primary} onChange={(v) => setTweak('primary', v)} />
        <TweakColor label="セカンダリ（水色）" value={t.secondary} onChange={(v) => setTweak('secondary', v)} />
        <TweakColor label="アクセント（ピンク）" value={t.accent} onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AllScreensApp />);
</script>
</body>
</html>
