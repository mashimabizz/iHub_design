<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iHub MVP v1 — 統合</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f3eef7; height: 100%; -webkit-font-smoothing: antialiased; }
  body { font-family: "Noto Sans JP", -apple-system, system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
  input[type=range] { -webkit-appearance: none; appearance: none; background: rgba(58,50,74,0.1); border-radius: 4px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.2), 0 0 0 2px var(--accent, #a695d8); cursor: pointer; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="home-variations.jsx"></script>
<script type="text/babel" src="home-v2.jsx"></script>
<script type="text/babel" src="c-flow.jsx"></script>
<script type="text/babel" src="b-inventory.jsx"></script>
<script type="text/babel" src="aw-edit.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "#a695d8",
  "secondary": "#a8d4e6",
  "accent": "#f3c5d4"
}/*EDITMODE-END*/;

// ── Send confirmation modal overlay (C-1 補強) ───────────────
function SendConfirmOverlay({ tweaks }) {
  const c = { lavender: tweaks.primary, sky: tweaks.secondary, pink: tweaks.accent,
    ink: '#3a324a', mute: 'rgba(58,50,74,0.55)', subtle: 'rgba(58,50,74,0.06)' };
  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 50,
      background: 'rgba(58,50,74,0.45)',
      backdropFilter: 'blur(4px)', WebkitBackdropFilter: 'blur(4px)',
      display: 'flex', alignItems: 'flex-end',
      fontFamily: '"Noto Sans JP", -apple-system, system-ui',
    }}>
      <div style={{
        width: '100%', background: '#fff',
        borderTopLeftRadius: 22, borderTopRightRadius: 22,
        padding: '20px 18px 30px', color: c.ink,
        boxShadow: '0 -10px 40px rgba(0,0,0,0.2)',
      }}>
        <div style={{ width: 36, height: 4, background: 'rgba(58,50,74,0.2)',
          borderRadius: 2, margin: '0 auto 16px' }} />
        <div style={{ fontSize: 17, fontWeight: 800, marginBottom: 4 }}>この内容で打診を送りますか？</div>
        <div style={{ fontSize: 12, color: c.mute, marginBottom: 14 }}>送信後はキャンセルできません · 相手に通知が届きます</div>
        <div style={{
          padding: 12, borderRadius: 12,
          background: `${c.lavender}10`, border: `0.5px solid ${c.lavender}33`,
          fontSize: 11.5, color: c.ink, lineHeight: 1.5, marginBottom: 14,
        }}>
          <b>@lumi_sua</b> へ · スア ⇄ ヒナ トレカ各1枚<br />
          <span style={{ color: c.mute }}>合流: 横浜アリーナ 西ゲート · 18:30〜</span>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button style={{
            flex: 1, height: 46, borderRadius: 14,
            background: '#fff', color: c.ink, border: `0.5px solid ${c.subtle}`,
            fontFamily: 'inherit', fontSize: 13.5, fontWeight: 600,
          }}>編集に戻る</button>
          <button style={{
            flex: 2, height: 46, borderRadius: 14,
            background: `linear-gradient(135deg, ${c.lavender}, ${c.sky})`,
            color: '#fff', border: 0, fontFamily: 'inherit',
            fontSize: 14, fontWeight: 700,
            boxShadow: `0 6px 16px ${c.lavender}50`,
          }}>送信する</button>
        </div>
      </div>
    </div>
  );
}

// ── QR overlay (C-2 補強) ──────────────────────────────────
function QROverlay({ tweaks }) {
  const c = { lavender: tweaks.primary, sky: tweaks.secondary, ink: '#3a324a',
    mute: 'rgba(58,50,74,0.55)', subtle: 'rgba(58,50,74,0.06)' };
  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 50,
      background: 'rgba(20,15,30,0.85)',
      backdropFilter: 'blur(8px)', WebkitBackdropFilter: 'blur(8px)',
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      padding: 24, color: '#fff',
      fontFamily: '"Noto Sans JP", -apple-system, system-ui',
    }}>
      <div style={{ fontSize: 13, opacity: 0.7, marginBottom: 4 }}>合流時に相手と相互スキャン</div>
      <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 18 }}>本人確認QR</div>
      <div style={{
        width: 200, height: 200, background: '#fff', borderRadius: 18,
        padding: 14, boxSizing: 'border-box', position: 'relative',
      }}>
        <svg viewBox="0 0 21 21" width="100%" height="100%" shapeRendering="crispEdges">
          {Array.from({ length: 21 * 21 }).map((_, i) => {
            const x = i % 21, y = Math.floor(i / 21);
            const corner = (cx, cy) => x >= cx && x < cx + 7 && y >= cy && y < cy + 7;
            const inner = (cx, cy) => x >= cx + 2 && x < cx + 5 && y >= cy + 2 && y < cy + 5;
            const ring = (cx, cy) => corner(cx, cy) && !inner(cx, cy) && (x === cx || x === cx + 6 || y === cy || y === cy + 6);
            const center = (cx, cy) => x >= cx + 2 && x < cx + 5 && y >= cy + 2 && y < cy + 5;
            const isCorner = ring(0, 0) || ring(14, 0) || ring(0, 14) || center(0, 0) || center(14, 0) || center(0, 14);
            if (isCorner) return <rect key={i} x={x} y={y} width={1} height={1} fill="#3a324a"/>;
            if (corner(0, 0) || corner(14, 0) || corner(0, 14)) return null;
            return ((x * 7 + y * 3 + x * y) % 5 < 2) ? <rect key={i} x={x} y={y} width={1} height={1} fill="#3a324a"/> : null;
          })}
        </svg>
        <div style={{
          position: 'absolute', top: '50%', left: '50%',
          transform: 'translate(-50%, -50%)',
          width: 36, height: 36, borderRadius: 8,
          background: c.lavender, color: '#fff',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 11, fontWeight: 800, letterSpacing: 0.5,
          boxShadow: '0 0 0 4px #fff',
        }}>iHub</div>
      </div>
      <div style={{ fontSize: 12, opacity: 0.7, marginTop: 14, textAlign: 'center', maxWidth: 240, lineHeight: 1.5 }}>
        相手のQRをスキャンすると、評価・取引履歴がチャット上で照合されます
      </div>
      <button style={{
        marginTop: 20, padding: '12px 24px', borderRadius: 999,
        background: '#fff', color: c.ink, border: 0,
        fontFamily: 'inherit', fontSize: 13, fontWeight: 700,
        display: 'inline-flex', alignItems: 'center', gap: 6,
      }}>
        <svg width="13" height="13" viewBox="0 0 13 13"><rect x="2" y="2" width="9" height="9" rx="1" stroke={c.ink} strokeWidth="1.4" fill="none"/><circle cx="6.5" cy="6.5" r="1.5" fill={c.ink}/></svg>
        相手のQRを読む
      </button>
    </div>
  );
}

// ── Dispute branch hint (C-3 補強) ──────────────────────────
function DisputeHintScreen({ tweaks }) {
  const c = { lavender: tweaks.primary, sky: tweaks.secondary, pink: tweaks.accent,
    ink: '#3a324a', mute: 'rgba(58,50,74,0.55)', subtle: 'rgba(58,50,74,0.06)', bg: '#fbf9fc' };
  return (
    <div style={{
      width: '100%', height: '100%', background: c.bg,
      fontFamily: '"Noto Sans JP", -apple-system, system-ui',
      color: c.ink, padding: '74px 18px 30px', boxSizing: 'border-box',
      overflowY: 'auto', fontFeatureSettings: '"palt"',
    }}>
      <div style={{ fontSize: 11, color: c.mute, fontWeight: 700, letterSpacing: 0.6, marginBottom: 6 }}>C-3 異常系プレビュー</div>
      <div style={{ fontSize: 22, fontWeight: 800, marginBottom: 14 }}>「相違あり」を選択</div>
      <div style={{
        padding: 14, borderRadius: 14, background: '#fff',
        border: `1.5px solid ${c.pink}88`, marginBottom: 12,
      }}>
        <div style={{ fontSize: 12.5, fontWeight: 700, marginBottom: 8 }}>何が違いましたか？</div>
        {['受け取った点数が少ない', 'グッズが違う / 状態が悪い', '相手が現れなかった', 'その他'].map((l, i) => (
          <div key={l} style={{
            padding: '10px 12px', borderRadius: 10,
            background: i === 0 ? `${c.pink}18` : c.subtle,
            border: i === 0 ? `1px solid ${c.pink}` : `0.5px solid transparent`,
            fontSize: 12, fontWeight: i === 0 ? 700 : 500,
            marginBottom: 6, display: 'flex', alignItems: 'center', gap: 8,
          }}>
            <div style={{
              width: 16, height: 16, borderRadius: '50%',
              border: `1.5px solid ${i === 0 ? c.pink : 'rgba(58,50,74,0.3)'}`,
              background: i === 0 ? c.pink : 'transparent',
              color: '#fff', fontSize: 9, display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>{i === 0 ? '✓' : ''}</div>
            {l}
          </div>
        ))}
      </div>
      <div style={{ padding: 14, borderRadius: 14, background: '#fff', border: `0.5px solid ${c.subtle}`, marginBottom: 12 }}>
        <div style={{ fontSize: 11, color: c.mute, fontWeight: 700, letterSpacing: 0.5, marginBottom: 6 }}>遷移先</div>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>1. 証跡写真をサポートに共有 →</div>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>2. 24時間以内に運営が仲裁 →</div>
        <div style={{ fontSize: 13, fontWeight: 600 }}>3. 相手の評価は保留（凍結）</div>
      </div>
      <div style={{ padding: '10px 12px', borderRadius: 10, background: `${c.lavender}14`, fontSize: 11, color: c.ink, lineHeight: 1.5 }}>
        <b>📝 デザインノート:</b> 相違あり申告フローは別画面で詳細設計予定（次マイルストーンの「異常系」スコープ）。ここはエントリポイントのみ可視化。
      </div>
    </div>
  );
}

function MVP() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <>
      <DesignCanvas
        title="iHub MVP v1 · 統合フロー"
        subtitle="ホーム → 打診(C-1) → チャット(C-2) → 完了(C-3) / 在庫(B) / AW · フィードバック反映済"
      >
        <DCSection id="home" title="ホーム · マッチング（推し色適用済 / タブ主語明示）">
          <DCArtboard id="home-v2" label="ホーム — 推し:LUMENA明示・主語明示タブ・距離精度フォールバック" width={420} height={900}>
            <IOSDevice width={420} height={900}><HomeV2 tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="cflow" title="C フロー · 打診 → チャット → 完了">
          <DCArtboard id="c1" label="C-1 打診 — @iHub推奨ソース表示・服装写真撮影CTA" width={420} height={900}>
            <IOSDevice width={420} height={900}><ProposeScreen tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="c1-confirm" label="C-1' 送信前確認モーダル（誤タップ防止）" width={420} height={900}>
            <IOSDevice width={420} height={900}>
              <div style={{ position: 'relative', width: '100%', height: '100%' }}>
                <ProposeScreen tweaks={t} />
                <SendConfirmOverlay tweaks={t} />
              </div>
            </IOSDevice>
          </DCArtboard>
          <DCArtboard id="c2" label="C-2 チャット — 服装写真・場所合意・時間チップ" width={420} height={900}>
            <IOSDevice width={420} height={900}><ChatScreen tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="c2-qr" label="C-2' QR本人確認オーバーレイ" width={420} height={900}>
            <IOSDevice width={420} height={900}>
              <div style={{ position: 'relative', width: '100%', height: '100%' }}>
                <ChatScreen tweaks={t} />
                <QROverlay tweaks={t} />
              </div>
            </IOSDevice>
          </DCArtboard>
          <DCArtboard id="c3-shoot" label="C-3① 証跡撮影 — 左=自分 / 右=相手 で固定（撮影者問わず）" width={420} height={900}>
            <IOSDevice width={420} height={900} dark><CompleteScreen tweaks={t} step="capture" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="c3-approve" label="C-3② 両者承認" width={420} height={900}>
            <IOSDevice width={420} height={900}><CompleteScreen tweaks={t} step="approve" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="c3-rate" label="C-3③ 評価＋特典＋コレクション進捗" width={420} height={900}>
            <IOSDevice width={420} height={900}><CompleteScreen tweaks={t} step="rate" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="c3-dispute" label="C-3 異常系 — 「相違あり」エントリ" width={420} height={900}>
            <IOSDevice width={420} height={900}><DisputeHintScreen tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="b-flow" title="B フロー · 在庫管理 + 撮影">
          <DCArtboard id="b1" label="B-1 在庫一覧 — 携帯モード・譲/求タブ・進捗" width={420} height={900}>
            <IOSDevice width={420} height={900}><InventoryScreen tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="b2-shoot" label="B-2① 撮影" width={420} height={900}>
            <IOSDevice width={420} height={900} dark><CaptureFlowScreen tweaks={t} step="shoot" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="b2-crop" label="B-2② 切り抜き" width={420} height={900}>
            <IOSDevice width={420} height={900}><CaptureFlowScreen tweaks={t} step="crop" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="b2-meta" label="B-2③ メタ入力" width={420} height={900}>
            <IOSDevice width={420} height={900}><CaptureFlowScreen tweaks={t} step="meta" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="b3-x" label="B-3 X投稿生成" width={420} height={900}>
            <IOSDevice width={420} height={900}><CaptureFlowScreen tweaks={t} step="xpost" /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="aw" title="AW · 参戦予定">
          <DCArtboard id="aw-list" label="AW一覧 — 「打診中」「クローズ通知まで」明示" width={420} height={900}>
            <IOSDevice width={420} height={900}><AWListScreen tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="aw-event" label="AW編集 案①イベント主導" width={420} height={900}>
            <IOSDevice width={420} height={900}><AWEditEventLed tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="aw-loc" label="AW編集 案②位置主導" width={420} height={900}>
            <IOSDevice width={420} height={900}><AWEditLocationLed tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="aw-other" label="他人のAW — DM/フォローCTAに置換済" width={420} height={900}>
            <IOSDevice width={420} height={900}><OtherAWPreviewScreen tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="iHub Tweaks">
        <TweakSection label="ブランドカラー" />
        <TweakColor label="プライマリ" value={t.primary} onChange={(v) => setTweak('primary', v)} />
        <TweakColor label="セカンダリ" value={t.secondary} onChange={(v) => setTweak('secondary', v)} />
        <TweakColor label="アクセント" value={t.accent} onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MVP />);
</script>
</body>
</html>
