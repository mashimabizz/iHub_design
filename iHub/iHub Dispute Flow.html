<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iHub C-3 異常系フロー · 相違あり詳細 + キャンセル + 遅刻</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f3eef7; height: 100%; -webkit-font-smoothing: antialiased; }
  body { font-family: "Noto Sans JP", -apple-system, system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="c-dispute.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "#a695d8",
  "secondary": "#a8d4e6",
  "accent": "#f3c5d4"
}/*EDITMODE-END*/;

function DisputeApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <>
      <DesignCanvas
        title="iHub C-3 異常系フロー"
        subtitle="相違あり詳細（6画面）+ 取引キャンセル/遅刻通知（同ファイル統合）· 24h SLA · 申告中は新規打診のみ制限"
      >
        <DCSection id="dispute" title="相違あり詳細フロー · 6画面">
          <DCArtboard id="d1" label="① カテゴリ選択 — 5種に分離・編集不可警告" width={420} height={900}>
            <IOSDevice width={420} height={900}><D1Category tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="d2-required" label="② 証跡追加（必須）— C-3証跡自動添付＋追加3枚" width={420} height={900}>
            <IOSDevice width={420} height={900}><D2Evidence tweaks={t} mode="required" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="d2-skippable" label="②' 証跡追加（任意）— 「相手が現れなかった」のみ" width={420} height={900}>
            <IOSDevice width={420} height={900}><D2Evidence tweaks={t} mode="noshow" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="d3" label="③ 送信完了 — 受付番号・24h SLA・凍結範囲明示" width={420} height={900}>
            <IOSDevice width={420} height={900}><D3Submitted tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="d4" label="④ 相手側 — 反論機会＋24h無回答=事実推定" width={420} height={900}>
            <IOSDevice width={420} height={900}><D4Respondent tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="d5" label="⑤a 仲裁中 — 反論ありパターン" width={420} height={900}>
            <IOSDevice width={420} height={900}><D5Arbitration tweaks={t} respondentResponse="disputed" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="d5-accepted" label="⑤b 仲裁中 — 相手が認めたパターン" width={420} height={900}>
            <IOSDevice width={420} height={900}><D5Arbitration tweaks={t} respondentResponse="accepted" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="d5-silent" label="⑤c 仲裁中 — 24h無回答パターン" width={420} height={900}>
            <IOSDevice width={420} height={900}><D5Arbitration tweaks={t} respondentResponse="silent" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="d5d" label="⑤d 運営からの追加質問リクエスト — 24h SLA" width={420} height={900}>
            <IOSDevice width={420} height={900}><D5dAdditionalInfo tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="d6-cancelled" label="⑥a 結果通知 — 取消が認められた" width={420} height={900}>
            <IOSDevice width={420} height={900}><D6Result tweaks={t} outcome="cancelled" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="d6-upheld" label="⑥b 結果通知 — 申告不成立（参考）" width={420} height={900}>
            <IOSDevice width={420} height={900}><D6Result tweaks={t} outcome="upheld" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="d6c" label="⑥c 再審査申立てフォーム — 1取引、1回、期限7日間" width={420} height={900}>
            <IOSDevice width={420} height={900}><D6cReappeal tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="d6d" label="⑥d 再審査受付ステータス — 48h可否判断、評価再保留" width={420} height={900}>
            <IOSDevice width={420} height={900}><D6dReappealReceived tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="related" title="関連フロー · 取引キャンセル / 遅刻通知（同ファイル統合）">
          <DCArtboard id="cancel" label="取引キャンセル — 相手同意があれば評価に影響なし" width={420} height={900}>
            <IOSDevice width={420} height={900}><D7CancelOrLate tweaks={t} kind="cancel" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="late" label="遅刻通知 — 遅延量＋理由＋自動通知" width={420} height={900}>
            <IOSDevice width={420} height={900}><D7CancelOrLate tweaks={t} kind="late" /></IOSDevice>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="iHub Dispute Tweaks">
        <TweakSection label="ブランドカラー" />
        <TweakColor label="プライマリ" value={t.primary} onChange={(v) => setTweak('primary', v)} />
        <TweakColor label="セカンダリ" value={t.secondary} onChange={(v) => setTweak('secondary', v)} />
        <TweakColor label="アクセント" value={t.accent} onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DisputeApp />);
</script>
</body>
</html>
