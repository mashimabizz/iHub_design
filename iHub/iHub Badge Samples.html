<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iHub Badge Samples · 推し一致バッジ4パターン比較</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f3eef7; height: 100%; -webkit-font-smoothing: antialiased; }
  body { font-family: "Noto Sans JP", -apple-system, system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="badge-samples.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "#a695d8",
  "secondary": "#a8d4e6",
  "accent": "#f3c5d4"
}/*EDITMODE-END*/;

const VARIANTS = [
  {
    id: 'A',
    label: '案A：現状（曖昧）',
    desc: '「推し一致」のみ。どのレベル（グループ/メンバー/箱推し）か不明。',
    eval: '◎ 文字数最少（4文字）／ ✗ 階層レベル不明・カードを開かないと分からない',
  },
  {
    id: 'B',
    label: '案B：簡潔（推し名を別行）',
    desc: 'バッジは「推し ●」と最小限。推し名は1行下に小さく明示。',
    eval: '◎ バッジコンパクト・他要素と並びやすい／○ 別行に「推し: LUMENA・スア」表示／✗ 視線移動が必要',
  },
  {
    id: 'C',
    label: '案C：詳細インライン',
    desc: 'バッジ内に推し名を含める。「LUMENA・スア 一致」「LUMENA 一致」「LUMENA 箱推し一致」など。',
    eval: '◎ 一目で詳細把握／✗ 文字数多くカード幅圧迫（特に長い推し名）',
  },
  {
    id: 'D',
    label: '案D：絵文字コンパクト',
    desc: '🎯 アイコン＋推し名のみ。「推し」の文字を省略。',
    eval: '◎ 短く目立つ／○ 視覚的に楽しい／✗ 「推し」の意味が暗黙的・初心者に不親切',
  },
];

function BadgeApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const W = 420, H = 900;
  return (
    <>
      <DesignCanvas
        title="マッチカード「推し一致」バッジ 4パターン比較"
        subtitle="同じ3カード（メンバー一致 / グループ一致 / 箱推し一致）を案A〜Dで並べて比較"
      >
        <DCSection id="badges" title="4パターンの比較">
          {VARIANTS.map(v => (
            <DCArtboard key={v.id} id={`badge-${v.id}`} label={v.label} width={W} height={H}>
              <IOSDevice width={W} height={H}><BSCard tweaks={t} variant={v} /></IOSDevice>
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Badge Samples Tweaks">
        <TweakSection label="ブランドカラー" />
        <TweakColor label="プライマリ" value={t.primary} onChange={(v) => setTweak('primary', v)} />
        <TweakColor label="セカンダリ" value={t.secondary} onChange={(v) => setTweak('secondary', v)} />
        <TweakColor label="アクセント" value={t.accent} onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BadgeApp />);
</script>
</body>
</html>
