<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iHub Profile Extras · プロフ編集・推し設定・ブロック・他人プロフ・本人確認・アプリ情報</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f3eef7; height: 100%; -webkit-font-smoothing: antialiased; }
  body { font-family: "Noto Sans JP", -apple-system, system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="account-extras.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "#a695d8",
  "secondary": "#a8d4e6",
  "accent": "#f3c5d4"
}/*EDITMODE-END*/;

function ExtrasApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const W = 420, H = 900;
  return (
    <>
      <DesignCanvas
        title="iHub Profile Extras（Phase 2）"
        subtitle="プロフ編集 / 推し設定 / ブロックリスト / 他人プロフ / 在庫公開 / 本人確認 / アプリ情報 / 削除完了 — 計8画面"
      >
        <DCSection id="profile" title="プロフィール編集系（自分）">
          <DCArtboard id="prof-edit" label="① プロフィール編集 — アイコン・ハンドル・自己紹介・公開情報" width={W} height={H}>
            <IOSDevice width={W} height={H}><ProfileEdit tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="oshi-edit" label="② 推し設定編集 — 複数推し管理・メンバー追加削除" width={W} height={H}>
            <IOSDevice width={W} height={H}><OshiEdit tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="privacy" title="プライバシー・公開設定">
          <DCArtboard id="block-list" label="③ ブロックリスト — ブロック中ユーザー一覧＋解除" width={W} height={H}>
            <IOSDevice width={W} height={H}><BlockList tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="inv-privacy" label="④ 在庫の公開設定 — 全部公開モデル＋休止モード" width={W} height={H}>
            <IOSDevice width={W} height={H}><InventoryPrivacy tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="other" title="他人プロフ・本人確認・アプリ情報・削除完了">
          <DCArtboard id="user-profile" label="⑤ 他人のプロフィール — マッチカードから飛んだ先・統計＋AW＋打診CTA" width={W} height={H}>
            <IOSDevice width={W} height={H}><UserProfile tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="identity" label="⑥ 本人確認 — メール認証済バッジ＋追加認証案内" width={W} height={H}>
            <IOSDevice width={W} height={H}><IdentityVerification tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="app-info" label="⑦ アプリ情報 — バージョン・OS・法的情報リンク・コピーライト" width={W} height={H}>
            <IOSDevice width={W} height={H}><AppInfo tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="delete-done" label="⑧ アカウント削除完了 — 削除データ一覧＋再登録CTA" width={W} height={H}>
            <IOSDevice width={W} height={H}><AccountDeleteComplete tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Profile Extras Tweaks">
        <TweakSection label="ブランドカラー" />
        <TweakColor label="プライマリ" value={t.primary} onChange={(v) => setTweak('primary', v)} />
        <TweakColor label="セカンダリ" value={t.secondary} onChange={(v) => setTweak('secondary', v)} />
        <TweakColor label="アクセント" value={t.accent} onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ExtrasApp />);
</script>
</body>
</html>
