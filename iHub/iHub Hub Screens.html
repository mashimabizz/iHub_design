<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iHub Hub Screens · ホーム再確認 · プロフハブ · ウィッシュ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f3eef7; height: 100%; -webkit-font-smoothing: antialiased; }
  body { font-family: "Noto Sans JP", -apple-system, system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="home-variations.jsx"></script>
<script type="text/babel" src="home-v2.jsx"></script>
<script type="text/babel" src="hub-screens.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "#a695d8",
  "secondary": "#a8d4e6",
  "accent": "#f3c5d4"
}/*EDITMODE-END*/;

function HubScreensApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const W = 420, H = 900;
  return (
    <>
      <DesignCanvas
        title="iHub Hub Screens"
        subtitle="ボトムナビ統一（ホーム／在庫／取引／ウィッシュ／プロフ）· プロフ＝アイデンティティハブ · ウィッシュ＝wish CRUD"
      >
        <DCSection id="home" title="ホーム再確認 — マッチ提案中心 · ナビ確定版">
          <DCArtboard id="hub-home" label="① ホーム — 4タブ（完全マッチ／私の譲が欲しい人／私が欲しい譲を持つ人／探索）" width={W} height={H}>
            <IOSDevice width={W} height={H}><HomeV2 tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="profile" title="プロフタブ — アイデンティティハブ（コレクションサマリ・AW・設定の入口）">
          <DCArtboard id="hub-profile" label="② プロフハブ — 統計＋コレクションサマリ（wish基準）＋活動＋設定" width={W} height={H}>
            <IOSDevice width={W} height={H}><ProfileHub tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="wishlist" title="ウィッシュタブ — 欲しいもの一覧 ＋ wish CRUD ＋ flexibility ＋ 探し中ステータス">
          <DCArtboard id="hub-wish-list" label="③ ウィッシュ一覧 — 優先度＋flexibility＋マッチ件数＋AW近隣" width={W} height={H}>
            <IOSDevice width={W} height={H}><WishlistList tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="hub-wish-empty" label="④ ウィッシュ空状態 — 3ステップ説明＋初回CTA" width={W} height={H}>
            <IOSDevice width={W} height={H}><WishlistEmpty tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="hub-wish-edit" label="⑤ ウィッシュ編集 — flexibility 3択＋通知1トグル＋プレビュー" width={W} height={H}>
            <IOSDevice width={W} height={H}><WishlistEdit tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Hub Screens Tweaks">
        <TweakSection label="ブランドカラー" />
        <TweakColor label="プライマリ" value={t.primary} onChange={(v) => setTweak('primary', v)} />
        <TweakColor label="セカンダリ" value={t.secondary} onChange={(v) => setTweak('secondary', v)} />
        <TweakColor label="アクセント" value={t.accent} onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<HubScreensApp />);
</script>
</body>
</html>
