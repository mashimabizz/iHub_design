<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iHub — Availability Window</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f3eef7; height: 100%; -webkit-font-smoothing: antialiased; }
  body { font-family: "Noto Sans JP", -apple-system, system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
  input[type=range] { -webkit-appearance: none; appearance: none; background: rgba(58,50,74,0.1); border-radius: 4px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.2), 0 0 0 2px var(--accent, #a695d8); cursor: pointer; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="home-variations.jsx"></script>
<script type="text/babel" src="aw-edit.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "#a695d8",
  "secondary": "#a8d4e6",
  "accent": "#f3c5d4"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <>
      <DesignCanvas
        title="iHub · Availability Window 編集"
        subtitle="参戦予定の作成・運用 / イベント主導 vs 位置主導の2案 / 一覧・他人プレビュー"
      >
        <DCSection id="aw-list" title="AW 一覧（エントリーポイント）">
          <DCArtboard id="list" label="ACTIVE NOW + SCHEDULED + 自動アーカイブ" width={420} height={900}>
            <IOSDevice width={420} height={900}><AWListScreen tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="aw-edit" title="AW 編集 — 2案">
          <DCArtboard id="event-led" label="① イベント主導型 — マスタから選んで詳細詰め" width={420} height={900}>
            <IOSDevice width={420} height={900}><AWEditEventLed tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="location-led" label="② 位置主導型 — 地図から半径＋近日イベント" width={420} height={900}>
            <IOSDevice width={420} height={900}><AWEditLocationLed tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="aw-other" title="他人のAWプレビュー（プロフから）">
          <DCArtboard id="other" label="マッチ判断を高速化 — 重なり示唆あり" width={420} height={900}>
            <IOSDevice width={420} height={900}><OtherAWPreviewScreen tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="iHub Tweaks">
        <TweakSection label="ブランドカラー" />
        <TweakColor label="プライマリ" value={t.primary} onChange={(v) => setTweak('primary', v)} />
        <TweakColor label="セカンダリ" value={t.secondary} onChange={(v) => setTweak('secondary', v)} />
        <TweakColor label="アクセント" value={t.accent} onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
