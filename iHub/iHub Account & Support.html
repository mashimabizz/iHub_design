<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iHub Account & Support · 取引タブ・通報・ヘルプ・設定</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f3eef7; height: 100%; -webkit-font-smoothing: antialiased; }
  body { font-family: "Noto Sans JP", -apple-system, system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="account-support.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "#a695d8",
  "secondary": "#a8d4e6",
  "accent": "#f3c5d4"
}/*EDITMODE-END*/;

function AccountSupportApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const W = 420, H = 900;
  return (
    <>
      <DesignCanvas
        title="iHub Account & Support"
        subtitle="D 取引タブ · E 規約違反通報 · F ヘルプ／問い合わせ · G 設定／AW一覧／通知"
      >
        <DCSection id="trade-tab" title="D. 取引タブ — 3サブタブ・保留中バッジ・空状態">
          <DCArtboard id="d-pending" label="① 打診中タブ — 送信／受信ラベル＋未返信アラート" width={W} height={H}>
            <IOSDevice width={W} height={H}><TradeTab tweaks={t} sub="pending" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="d-active" label="② 進行中タブ — 申告中「保留中」バッジ" width={W} height={H}>
            <IOSDevice width={W} height={H}><TradeTab tweaks={t} sub="active" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="d-past" label="③ 過去取引タブ — フィルタ・状態・コレクションリンク" width={W} height={H}>
            <IOSDevice width={W} height={H}><TradeTab tweaks={t} sub="past" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="d-empty" label="④ 空状態 — 初心者誘導CTA" width={W} height={H}>
            <IOSDevice width={W} height={H}><TradeTab tweaks={t} sub="past" empty /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="report" title="E. 規約違反通報 — プロフ／取引詳細から起動">
          <DCArtboard id="e-form" label="① 通報フォーム — カテゴリ6種＋証跡＋警告" width={W} height={H}>
            <IOSDevice width={W} height={H}><ReportForm tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="e-complete" label="② 受付完了 — #REP番号＋ブロック動線" width={W} height={H}>
            <IOSDevice width={W} height={H}><ReportComplete tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="help" title="F. ヘルプ・問い合わせ">
          <DCArtboard id="f-faq" label="① FAQ — 検索＋カテゴリ別アコーディオン＋運営問合せCTA" width={W} height={H}>
            <IOSDevice width={W} height={H}><HelpFAQ tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="f-contact" label="② 問い合わせフォーム — カテゴリ＋環境情報自動添付" width={W} height={H}>
            <IOSDevice width={W} height={H}><ContactForm tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="settings" title="G. 設定 — トップ＋AW一覧＋通知">
          <DCArtboard id="g-top" label="① 設定トップ — プロフィールチップ＋8グループ" width={W} height={H}>
            <IOSDevice width={W} height={H}><SettingsTop tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="g-aw" label="② 自分のAW一覧 — 同時並行管理ハブ" width={W} height={H}>
            <IOSDevice width={W} height={H}><MyAWList tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="g-notif" label="③ 通知設定 — トピック別ON/OFF＋夜間ミュート" width={W} height={H}>
            <IOSDevice width={W} height={H}><NotificationSettings tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Account & Support Tweaks">
        <TweakSection label="ブランドカラー" />
        <TweakColor label="プライマリ" value={t.primary} onChange={(v) => setTweak('primary', v)} />
        <TweakColor label="セカンダリ" value={t.secondary} onChange={(v) => setTweak('secondary', v)} />
        <TweakColor label="アクセント" value={t.accent} onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AccountSupportApp />);
</script>
</body>
</html>
