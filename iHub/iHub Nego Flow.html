<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iHub 受諾前ネゴ · C-1受信 / C-1.5ネゴチャット / 相手の譲モーダル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f3eef7; height: 100%; -webkit-font-smoothing: antialiased; }
  body { font-family: "Noto Sans JP", -apple-system, system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="nego-flow.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "#a695d8",
  "secondary": "#a8d4e6",
  "accent": "#f3c5d4"
}/*EDITMODE-END*/;

function NegoApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const W = 420, H = 900;
  return (
    <>
      <DesignCanvas
        title="受諾前ネゴシエーションフロー"
        subtitle="C-1受信 → C-1.5ネゴチャット → C-2取引チャット への流れ。期限7日・3日目/6日目リマインド・延長可"
      >
        <DCSection id="receive" title="C-1受信 — 打診を受け取った側の画面">
          <DCArtboard id="c1-receive" label="① C-1受信 — 提案内容＋メッセージ＋自動添付情報＋3択CTA" width={W} height={H}>
            <IOSDevice width={W} height={H}><C1ReceiveScreen tweaks={t} daysLeft={6} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="nego" title="C-1.5 ネゴチャット — 提案修正＋クイックアクション＋4状態">
          <DCArtboard id="nego-normal" label="② ネゴチャット 通常 — 提案修正履歴・チャット・クイックアクション" width={W} height={H}>
            <IOSDevice width={W} height={H}><C15NegoChatScreen tweaks={t} scenario="normal" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="nego-r3" label="③ ネゴチャット 3日目リマインド — 残り4日表示＋延長CTA" width={W} height={H}>
            <IOSDevice width={W} height={H}><C15NegoChatScreen tweaks={t} scenario="reminder3" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="nego-r6" label="④ ネゴチャット 6日目リマインド — 残り1日警告＋延長CTA" width={W} height={H}>
            <IOSDevice width={W} height={H}><C15NegoChatScreen tweaks={t} scenario="reminder6" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="nego-expired" label="⑤ ネゴチャット 期限切れ — 自動クローズ後・読み取り専用" width={W} height={H}>
            <IOSDevice width={W} height={H}><C15NegoChatScreen tweaks={t} scenario="expired" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="nego-mine-agreed" label="⑥ ネゴチャット あなた合意済 — 相手の合意待ち（CTA disabled）" width={W} height={H}>
            <IOSDevice width={W} height={H}><C15NegoChatScreen tweaks={t} scenario="mine-agreed" /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="agreement" title="合意送信モーダル & 取引成立画面">
          <DCArtboard id="agreement-modal" label="⑦ 合意送信前モーダル — 取引内容の最終確認＋警告" width={W} height={H}>
            <IOSDevice width={W} height={H}>
              <div style={{ position: 'relative', width: '100%', height: '100%' }}>
                <C15NegoChatScreen tweaks={t} scenario="normal" />
                <div style={{ position: 'absolute', inset: 0, zIndex: 50 }}>
                  <C15AgreementConfirmModal tweaks={t} />
                </div>
              </div>
            </IOSDevice>
          </DCArtboard>
          <DCArtboard id="agreement-success" label="⑧ 取引成立画面 — 紙吹雪＋スパークル＋取引内容＋次のステップ＋C-2へCTA" width={W} height={H}>
            <IOSDevice width={W} height={H}><C15AgreementSuccess tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="modal" title="相手の譲モーダル — ネゴ中に参照">
          <DCArtboard id="partner-inv" label="⑨ 相手の譲モーダル — 一覧＋wish一致＋提案中バッジ＋希望に追加" width={W} height={H}>
            <IOSDevice width={W} height={H}><PartnerInventoryModal tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Nego Flow Tweaks">
        <TweakSection label="ブランドカラー" />
        <TweakColor label="プライマリ" value={t.primary} onChange={(v) => setTweak('primary', v)} />
        <TweakColor label="セカンダリ" value={t.secondary} onChange={(v) => setTweak('secondary', v)} />
        <TweakColor label="アクセント" value={t.accent} onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<NegoApp />);
</script>
</body>
</html>
