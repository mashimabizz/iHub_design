<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iHub F-10 コレクション図鑑 · 達成感最大化フロー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f3eef7; height: 100%; -webkit-font-smoothing: antialiased; }
  body { font-family: "Noto Sans JP", -apple-system, system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="pokedex.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "#a695d8",
  "secondary": "#a8d4e6",
  "accent": "#f3c5d4"
}/*EDITMODE-END*/;

function PokedexApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <>
      <DesignCanvas
        title="iHub F-10 コレクション図鑑"
        subtitle="達成感最大化 · 進捗バー＋シルエットグリッド · wish連携 · X共有 · コンプ達成演出"
      >
        <DCSection id="pokedex" title="コレクション図鑑 · 3画面 + 達成演出">
          <DCArtboard id="pd-list" label="① 図鑑一覧 — 進捗バー＋シルエット＋シリーズ別" width={420} height={900}>
            <IOSDevice width={420} height={900}><PokedexList tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="pd-owned" label="② 取得済アイテム詳細 — 取引履歴・取得日・相手プロフ" width={420} height={900}>
            <IOSDevice width={420} height={900}><PokedexDetailOwned tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="pd-missing" label="③ 未取得アイテム — 「探し中」ステータス＋wish連携" width={420} height={900}>
            <IOSDevice width={420} height={900}><PokedexDetailMissing tweaks={t} /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="pd-comp" label="④ コンプ達成演出 — バッジ＋X投稿テンプレート" width={420} height={900}>
            <IOSDevice width={420} height={900}><CompleteCelebration tweaks={t} /></IOSDevice>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="iHub Pokedex Tweaks">
        <TweakSection label="ブランドカラー" />
        <TweakColor label="プライマリ" value={t.primary} onChange={(v) => setTweak('primary', v)} />
        <TweakColor label="セカンダリ" value={t.secondary} onChange={(v) => setTweak('secondary', v)} />
        <TweakColor label="アクセント" value={t.accent} onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PokedexApp />);
</script>
</body>
</html>
