<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iHub C-0 提示物選択 · 完全マッチ・片方向マッチ全パターン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f3eef7; height: 100%; -webkit-font-smoothing: antialiased; }
  body { font-family: "Noto Sans JP", -apple-system, system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="propose-select.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "#a695d8",
  "secondary": "#a8d4e6",
  "accent": "#f3c5d4"
}/*EDITMODE-END*/;

function ProposeSelectApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const W = 420, H = 900;
  return (
    <>
      <DesignCanvas
        title="C-0 提示物選択 · 全パターン対応"
        subtitle="完全マッチ・片方向マッチで両side選択可能。私が出す/受け取る/待ち合わせ の3タブ・推奨デフォルト＋自由変更"
      >
        <DCSection id="full" title="完全マッチからの打診（両側に推奨アイテムあり）">
          <DCArtboard id="full-mine" label="① 完全マッチ・私が出すタブ — wish一致のみpre-check、自由に追加・解除可" width={W} height={H}>
            <IOSDevice width={W} height={H}><ProposeSelectScreen tweaks={t} scenario="full" initialTab="mine" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="full-theirs" label="② 完全マッチ・私が受け取るタブ — 相手の譲一覧から選ぶ" width={W} height={H}>
            <IOSDevice width={W} height={H}><ProposeSelectScreen tweaks={t} scenario="full" initialTab="theirs" /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="forward" title="「私が欲しい譲を持つ人」から打診（trigger=相手の譲）">
          <DCArtboard id="fwd" label="③ Forward — 相手の譲が興味起点・私の譲は自由に選ぶ" width={W} height={H}>
            <IOSDevice width={W} height={H}><ProposeSelectScreen tweaks={t} scenario="forward" initialTab="mine" /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="backward" title="「私の譲が欲しい人」から打診（trigger=私の譲）">
          <DCArtboard id="bwd" label="④ Backward — 私の譲が起点・相手の譲から欲しいものを選ぶ" width={W} height={H}>
            <IOSDevice width={W} height={H}><ProposeSelectScreen tweaks={t} scenario="backward" initialTab="theirs" /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="meetup" title="待ち合わせタブ — 日時・場所の事前fix（即時 / 日時指定の2モード）">
          <DCArtboard id="meetup-scheduled" label="⑤ 日時指定モード — 登録済AWから選択 / カスタム日時+AW自動登録" width={W} height={H}>
            <IOSDevice width={W} height={H}><ProposeSelectScreen tweaks={t} scenario="full" initialTab="meetup" initialMeetupType="scheduled" /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="meetup-now" label="⑥ 即時モード — 5/10/15/30分以内＋現在地周辺のマップ表示" width={W} height={H}>
            <IOSDevice width={W} height={H}><ProposeSelectScreen tweaks={t} scenario="full" initialTab="meetup" initialMeetupType="now" /></IOSDevice>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Propose Select Tweaks">
        <TweakSection label="ブランドカラー" />
        <TweakColor label="プライマリ" value={t.primary} onChange={(v) => setTweak('primary', v)} />
        <TweakColor label="セカンダリ" value={t.secondary} onChange={(v) => setTweak('secondary', v)} />
        <TweakColor label="アクセント" value={t.accent} onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ProposeSelectApp />);
</script>
</body>
</html>
