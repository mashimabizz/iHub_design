<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iHub — Home (Matching)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0ece6; height: 100%; -webkit-font-smoothing: antialiased; }
  body { font-family: "Noto Sans JP", -apple-system, system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="home-variations.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "oshiColor": "pink",
  "showVenueBanner": true
}/*EDITMODE-END*/;

const OSHI_PALETTES = {
  pink:    { hex: '#e26a87', label: 'ピンク' },
  purple:  { hex: '#8866cc', label: 'パープル' },
  blue:    { hex: '#3a8cd9', label: 'ブルー' },
  mint:    { hex: '#3eaa92', label: 'ミント' },
  amber:   { hex: '#c98a3a', label: 'アンバー' },
  rose:    { hex: '#c45579', label: 'ローズ' },
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = OSHI_PALETTES[t.oshiColor]?.hex || OSHI_PALETTES.pink.hex;

  return (
    <>
      <DesignCanvas
        title="iHub · ホーム画面（マッチング4タブ）"
        subtitle="完全マッチ → 求めてる → 求める → 探索 / オフラインファースト / 1〜2分で打診まで"
      >
        <DCSection id="home" title="ホーム画面 — 3案">
          <DCArtboard id="A" label="A. ヒーロースタック型 — 完全マッチ最上位" width={420} height={900}>
            <IOSDevice width={420} height={900}>
              <VariationA accent={accent} />
            </IOSDevice>
          </DCArtboard>

          <DCArtboard id="B" label="B. フォトフィード型 — 推し色強め・ダーク" width={420} height={900}>
            <IOSDevice width={420} height={900} dark>
              <VariationB accent={accent} />
            </IOSDevice>
          </DCArtboard>

          <DCArtboard id="C" label="C. 密度最大リスト型 — 時間プレッシャー特化" width={420} height={900}>
            <IOSDevice width={420} height={900}>
              <VariationC accent={accent} />
            </IOSDevice>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="iHub Tweaks">
        <TweakSection label="推し色" />
        <TweakSelect
          label="アクセント"
          value={t.oshiColor}
          options={Object.entries(OSHI_PALETTES).map(([v, p]) => ({ value: v, label: p.label }))}
          onChange={(v) => setTweak('oshiColor', v)}
        />
        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 4, marginTop: 2,
        }}>
          {Object.entries(OSHI_PALETTES).map(([v, p]) => (
            <button key={v} onClick={() => setTweak('oshiColor', v)} style={{
              height: 22, borderRadius: 6, background: p.hex,
              border: t.oshiColor === v ? '1.5px solid #1a1714' : '0.5px solid rgba(0,0,0,0.1)',
              cursor: 'pointer',
            }} />
          ))}
        </div>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
